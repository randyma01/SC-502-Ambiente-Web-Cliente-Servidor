<section class="position-relative min-vh-100 d-flex align-items-center justify-content-center py-5 overflow-hidden">
  <app-page-background startColor="#E8F4FF" endColor="#EDE8FF"></app-page-background>

  <div class="container-xl px-4 position-relative z-1 w-100 max-w-md" style="max-width: 440px;">
    <!-- Brand Title link to Home -->
    <div class="text-center mb-4">
      <a routerLink="/" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-2">
        <span class="fs-4 fw-black text-dark" style="font-weight: 900; letter-spacing: -0.03em;">MGN</span>
        <span class="d-inline-block bg-primary rounded-circle" style="width: 6px; height: 6px; background-color: var(--blue) !important;"></span>
      </a>
      <p class="text-xs text-uppercase tracking-widest text-muted fw-semibold" style="font-size: 0.65rem; letter-spacing: 0.22em;">
        {{ isLogin() ? 'Inicio de sesión' : 'Registro de cliente' }}
      </p>
    </div>

    <!-- Auth Card Container -->
    <div class="p-4 p-md-5 border rounded-4 bg-white shadow-lg"
      style="border-color: rgba(0,0,0,0.08) !important;">
      
      <!-- Error Banner -->
      @if (error()) {
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-4 p-3 rounded-3" style="font-size: 0.8rem; border-color: rgba(220,53,69,0.15);">
          <i class="bi bi-exclamation-triangle-fill fs-6 text-danger"></i>
          <span class="fw-medium text-danger-emphasis">{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #authForm="ngForm">
        <div class="d-flex flex-column gap-4">
          
          <!-- LOGIN VIEW -->
          @if (isLogin()) {
            <div>
              <label class="text-uppercase fw-semibold text-muted d-block mb-2" style="font-size: 10px; letter-spacing: 0.14em;">
                Correo electrónico <span class="text-success">*</span>
              </label>
              <input type="email" required name="loginCorreo" placeholder="correo@empresa.com"
                [(ngModel)]="loginData.correo"
                (focus)="setFocused('loginCorreo')" (blur)="setFocused(null)"
                class="form-control px-3 py-2.5 shadow-none border-1"
                [ngClass]="{ 'form-field-focused': focusedField() === 'loginCorreo' }"
                style="border-radius: 10px; font-size: 0.85rem;" />
            </div>

            <div>
              <label class="text-uppercase fw-semibold text-muted d-block mb-2" style="font-size: 10px; letter-spacing: 0.14em;">
                Contraseña <span class="text-success">*</span>
              </label>
              <input type="password" required name="loginContrasena" placeholder="••••••••"
                [(ngModel)]="loginData.contrasena"
                (focus)="setFocused('loginContrasena')" (blur)="setFocused(null)"
                class="form-control px-3 py-2.5 shadow-none border-1"
                [ngClass]="{ 'form-field-focused': focusedField() === 'loginContrasena' }"
                style="border-radius: 10px; font-size: 0.85rem;" />
            </div>
          }

          <!-- REGISTER VIEW -->
          @else {
            <div>
              <label class="text-uppercase fw-semibold text-muted d-block mb-2" style="font-size: 10px; letter-spacing: 0.14em;">
                Nombre completo <span class="text-success">*</span>
              </label>
              <input type="text" required name="regNombre" placeholder="Juan Pérez"
                [(ngModel)]="registerData.nombre"
                (focus)="setFocused('regNombre')" (blur)="setFocused(null)"
                class="form-control px-3 py-2.5 shadow-none border-1"
                [ngClass]="{ 'form-field-focused': focusedField() === 'regNombre' }"
                style="border-radius: 10px; font-size: 0.85rem;" />
            </div>

            <div>
              <label class="text-uppercase fw-semibold text-muted d-block mb-2" style="font-size: 10px; letter-spacing: 0.14em;">
                Correo electrónico <span class="text-success">*</span>
              </label>
              <input type="email" required name="regCorreo" placeholder="correo@empresa.com"
                [(ngModel)]="registerData.correo"
                (focus)="setFocused('regCorreo')" (blur)="setFocused(null)"
                class="form-control px-3 py-2.5 shadow-none border-1"
                [ngClass]="{ 'form-field-focused': focusedField() === 'regCorreo' }"
                style="border-radius: 10px; font-size: 0.85rem;" />
            </div>

            <div>
              <label class="text-uppercase fw-semibold text-muted d-block mb-2" style="font-size: 10px; letter-spacing: 0.14em;">
                Contraseña <span class="text-success">*</span>
              </label>
              <input type="password" required name="regContrasena" placeholder="••••••••"
                [(ngModel)]="registerData.contrasena"
                (focus)="setFocused('regContrasena')" (blur)="setFocused(null)"
                class="form-control px-3 py-2.5 shadow-none border-1"
                [ngClass]="{ 'form-field-focused': focusedField() === 'regContrasena' }"
                style="border-radius: 10px; font-size: 0.85rem;" />
            </div>
          }

          <!-- Submit Button -->
          <button type="submit" [disabled]="loading() || !authForm.form.valid"
            class="btn text-white text-uppercase fw-semibold py-3 d-inline-flex align-items-center justify-content-center gap-2 w-100 disabled:opacity-50 mt-2"
            [ngStyle]="{ 'background': loading() ? '#4B5563' : 'linear-gradient(135deg, var(--blue), var(--purple))' }"
            style="border-radius: 10px; font-size: 0.75rem; letter-spacing: 0.12em; border: none; transition: all 0.3s;">
            @if (loading()) {
              Procesando…
            } @else {
              <span>{{ isLogin() ? 'Iniciar sesión' : 'Registrar cuenta' }}</span>
              <i class="bi bi-arrow-right-short fs-5"></i>
            }
          </button>
        </div>
      </form>

      <!-- Toggle Mode Link -->
      <div class="text-center mt-4 pt-3 border-top" style="border-color: rgba(0,0,0,0.06) !important;">
        <button (click)="toggleView()" class="btn btn-link text-decoration-none text-muted" style="font-size: 0.8rem;">
          {{ isLogin() ? '¿No tiene una cuenta? Regístrese aquí' : '¿Ya tiene una cuenta? Inicie sesión' }}
        </button>
      </div>

      <!-- Quick credentials help for testing -->
      @if (isLogin()) {
        <div class="mt-4 p-3 border rounded-3 text-muted" style="background-color: #F8F9FA; font-size: 0.75rem; border-color: rgba(0,0,0,0.06) !important;">
          <p class="fw-bold mb-1 text-dark">Credenciales de prueba:</p>
          <ul class="mb-0 ps-3">
            <li><strong>Cliente:</strong> client&#64;mgn.tech / client123</li>
            <li><strong>Soporte:</strong> support&#64;mgn.tech / support123</li>
            <li><strong>Admin:</strong> admin&#64;mgn.tech / admin123</li>
          </ul>
        </div>
      }

    </div>
  </div>
</section>
